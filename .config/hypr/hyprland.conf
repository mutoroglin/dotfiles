#exec-once = wl-paste --type image --watch cliphist store

# graphics and themes settings
exec-once = /usr/local/bin/init_gsettings.sh
exec-once = hyprctl setcursor XCursor-Pro-Red 24

# ensure system boots-up with bluetooth switched-off
exec-once = bluetoothctl power off

# wallpaper swap administration
exec-once = hyprwatch.sh > /var/tmp/hyprwatch.log &


# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
# to-do: decide whether to set env variables here or via bash (use just one approach for simplification)
env = XCURSOR_SIZE, 24
env = GRIM_DEFAULT_DIR, /home/lee/Pictures/grim
env = TERM, xdg-terminal-exec
env = TERMINAL, xdg-terminal-exec

# ## HYPRLAND SETTINGS ###
# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# See https://wiki.hyprland.org/Configuring/Variables/ for more
general {
    gaps_in = 2
    gaps_out = 2
    border_size = 2
    # col.active_border = rgba(ff0000ff) rgba(ff8000ff) 90deg
    col.active_border = $ACTIVE_BORDER
    col.inactive_border = rgba(ffffff88) rgba(aaaaaaaa) 25deg

    layout = dwindle
}

# See https://wiki.hyprland.org/Configuring/Variables/ for more
decoration {
    rounding = 3
    #drop_shadow = yes
    #shadow_range = 4
    #shadow_render_power = 3
    #col.shadow = rgba(1a1a1aee)

    inactive_opacity = 0.8
    # dim_inactive = true
    # dim_strength = 0.6
    # idea: use 'screen_shader' to remove color from inactive windows
}

blur {
    #blur = yes
    #blur_size = 3
    #blur_passes = 1
    #blur_new_optimizations = true
    #blur_ignore_opacity = true
    #blur_xray = false
}

# Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 5, default, popin 0%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 5, default, slide
}

input {
    touchdevice {
        transform = 0
    }
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
#    pseudotile = yes       # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes   # you probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
#    new_is_master = true
}

# See https://wiki.hyprland.org/Configuring/Variables/ for more
gestures {
#    workspace_swipe = true
#    workspace_swipe_fingers = 3
#    workspace_swipe_distance = 100
#    workspace_swipe_forever = false
}
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
# device:epic-mouse-v1 {
#     sensitivity = -0.5
# }

# disable the logo to avaoid a flickering on change of wallpaper
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    anr_missed_pings = 2
}

debug {
    disable_logs = false
}

# ## WINDOW RULES ###
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# APP RULES
# ## Galculator
windowrule = match:class ^(galculator)$, float on, center on, size 800 400
# ## Remmina
windowrule = match:title ^(Remmina Remote Desktop Client)$, float on, center on, size 800 400
# ## blueberry (bluetooth agent)
windowrule = match:class ^(blueberry.py)$, float on, center on, size 800 400
# ## blueman (bluetooth agent)
windowrule = match:class ^(blueman-manager)$, float on, center on, size 800 400
windowrule = match:class ^(blueman-services)$, float on, center on, size 800 500
windowrule = match:class ^(blueman-sendto)$, float on, center on
# ## pwvucontrol (sound control)
windowrule = match:class ^(com.saivert.pwvucontrol)$, float on, center on, size 800 400
# ##    Thunar
windowrule = match:class ^([Tt]hunar)$, match:title ^(.*Progress)$, float on, center on, size 800 100
windowrule = match:class ^([Tt]hunar)$, match:title ^(Confirm.*)$, float on, center on, size 800 100
windowrule = match:class ^([Tt]hunar)$, match:title ^(Rename.*)$, float on, center on, size 800 100
# ## Nextcloud
windowrule = move 300 42, match:class ^(com.nextcloud.desktopclient.nextcloud)$, float on, move 300 42, size 500 800
# ## LibreOffice
windowrule = match:class ^(soffice)$, float on
# ## x-sane
windowrule = match:class ^(Xsane)$, match:title ^(xsane End User License Agreement)$, float on
windowrule = match:class ^(Xsane)$, match:title ^(Warning)$, float on
# ## authentication
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on
# ## Firefox
windowrule = match:class ^(firefox)$, match:title ^(Library)$, float on
# ## Thunderbird
windowrule = match:class ^(thunderbird)$, float on
windowrule = match:class ^(thunderbird)$, match:title ^.*(Mozilla Thunderbird)$, tile on
windowrule = match:class ^(org.twosheds.iwgtk)$, float on, size 550 600, move 50 42
# ## iwgtk
windowrule = match:class ^(.*iwgtk)$, float on
# ## inkscape
#windowrulev2 = float, class:^(org.inkscape.Inkscape)$
#windowrulev2 = tile, class:^(org.inkscape.Inkscape)$, title:^.*(- Inkscape)$
# ## gimp
#windowrule = match:initialclass ^(Gimp.*)$, match:float, no-dim on
windowrule = match:class ^(file-jpeg)$, float on
windowrule = match:class ^(file-png)$, float on, size 1000 550, center on
windowrule = match:class ^(file-pdf-export)$, match:title ^(Export Image as PDF)$, float on
# ## vlc
#windowrulev2 = nodim, initialClass:^(vlc)$, floating:1
# ## mount_stuff.sh
#windowrule = match:title ^(Alacritty)$, float on

# COMMON RULES
# ## all xwayland windows have orange border
windowrule = match:xwayland 1, border_color rgba(ff8000ff) rgba(aaaaaaaa)
# ## all floating windwows have white border
windowrule = match:float 1, border_color rgba(ddddddff) rgba(aaaaaaaa)


# ## LAYER RULES ###
layerrule = blur on, match:namespace wofi
layerrule = dim_around on, match:namespace wofi


# ## BINDS ###
# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
$mainMod_Shift =SUPER_SHIFT

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
# hyprland, statusbar and window controls
bind = $mainMod, Q, fullscreen,
bind = $mainMod, V, togglefloating,
bind = $mainMod, A, fullscreenstate, 1, 2
bind = $mainMod, C, killactive,
#bind = $mainMod, J, togglesplit,
bind = $mainMod, W, exec, killall -SIGUSR1 waybar

# launcher and applications
bind = $mainMod, R, exec, /usr/local/bin/launch_launcher.sh
bind = $mainMod, E, exec, thunar
bind = $mainMod, D, exec, dolphin
bind = $mainMod, F4, exec, /usr/local/bin/launch_powerswitch.sh
bind = $mainMod, T, exec, alacritty
bind = $mainMod, S, exec, grim -c

# Move focus controls
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, Tab, cyclenext
bind = $mainMod_Shift, Tab , cyclenext, prev

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# ## BINDS/WORKSPACES ###
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


# ## BINDS/SPECIAL KEYS ###
binde =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle; launch_panel.sh volume
binde =, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-; launch_panel.sh volume
binde =, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+; launch_panel.sh volume
binde =, XF86MonBrightnessUp, exec, brightnessctl -c backlight s 5%+; launch_panel.sh brightness
binde =, XF86MonBrightnessDown, exec, brightnessctl -c backlight s 5%-; launch_panel.sh brightness
binde =, XF86AudioMicMute, exec, pactl set-source-mute 0 toggle; launch_panel.sh mic


# ## BINDS/LID ACTION ###
bindl=,switch:off:Lid Switch, exec, hyprlock --immediate
