#exec-once = hypridle
#exec-once = hyprpaper
#exec-once = waybar >> ~/.log/waybar/waybar.log &
#exec-once = /usr/bin/dunst
#exec-once = /usr/lib/polkit-kde-authentication-agent-1
#exec-once = /usr/bin/hyprpaper
