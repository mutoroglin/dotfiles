# https://alacritty.org/config-alacritty.html

[cursor.style]
shape = "Beam"
blinking = "Always"
#blink_interval = 400
#thickness = 0.3
#unfocused_hollow = true

[font]
size = 13.0
offset.x = 0
offset.y = -2

[font.bold]
#family = "MartianMono Nerd Font"
#family = "VictorMono Nerd Font"
family = "Iosevka Nerd Font Mono"
style = "Bold"

[font.bold_italic]
#family = "VictorMono Nerd Font"
family = "Iosevka Nerd Font Mono"
style = "Bold Italic"
#family = "MartianMono Nerd Font"
#style = "Condensed Bold"

[font.italic]
#family = "VictorMono Nerd Font"
family = "Iosevka Nerd Font Mono"
style = "Italic"
#family = "MartianMono Nerd Font"
#style = "Condensed Regular"

[font.normal]
#family = "MartianMono Nerd Font"
#family = "VictorMono Nerd Font"
family = "Iosevka Nerd Font Mono"
style = "Regular"

[window]
dynamic_title = true
opacity = 0.85

[window.padding]
x = 5
y = 5

[colors.primary]
foreground="#000000"
background="#EEEEEE"



